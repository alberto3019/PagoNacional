<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Pago Nacional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #12122a; --navy-mid:#1e1e40; --accent:#4f46e5;
      --text:#1a1a2e; --text-muted:#6b7280; --border:#e5e7eb;
      --bg:#f9f9f7; --white:#ffffff; --danger:#dc2626;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; color:var(--text); }
    .header {
      background: var(--navy); padding: 10px 16px; min-height: 68px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .brand {
      flex: 1; min-width: 0; max-width: calc(100% - 130px); height: 52px;
      display: flex; align-items: center; justify-content: flex-start;
      background: transparent; line-height: 0;
    }
    .brand img {
      display: block; max-width: 100%; max-height: 100%; width: auto; height: auto;
      object-fit: contain; object-position: left center;
    }
    .header-sub {
      flex-shrink: 0; max-width: 38%; text-align: right; line-height: 1.35;
      color: rgba(255,255,255,0.5); font-size: 10px;
    }
    @media (min-width: 480px) {
      .header-sub { font-size: 12px; max-width: 46%; }
    }
    @media (min-width: 768px) {
      .header { min-height: 72px; padding: 12px 20px; }
      .brand { height: 64px; max-width: min(560px, calc(100% - 160px)); }
    }
    @media (min-width: 1024px) {
      .brand { height: 72px; max-width: min(640px, calc(100% - 180px)); }
    }
    @media (min-width: 1280px) {
      .brand { height: 76px; max-width: min(700px, calc(100% - 200px)); }
    }
    .container { max-width: 480px; margin: 0 auto; padding: 32px 20px 60px; }
    .page-title { font-family:'DM Serif Display',serif; font-size:26px; margin-bottom:6px; }
    .page-sub { font-size:14px; color:var(--text-muted); margin-bottom: 22px; line-height: 1.6; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; }
    .field input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:8px; font-size:15px; font-family:'DM Sans',sans-serif; }
    .field input:focus { outline:none; border-color: var(--accent); }
    .btn-primary { width:100%; padding:15px; background: var(--navy); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; }
    .btn-primary:hover { background:#0f0f22; }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.error { background: #fee2e2; color: #991b1b; display:block; }
    .alert.success { background: #d1fae5; color: #065f46; display:block; }
    .link { text-align:center; font-size:13px; color:var(--text-muted); margin-top:16px; }
    .link-stack { display: grid; gap: 10px; margin-top: 16px; text-align: center; font-size: 13px; color: var(--text-muted); }
    .link a { color: var(--accent); text-decoration:none; font-weight:500; }
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation: spin 0.7s linear infinite; margin-right:8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="brand"><img src="/logo-pago-nacional.png?v=5" alt="Pago Nacional" width="1063" height="378" decoding="async" /></span>
    <span class="header-sub">Sistema de cambio de echeqs</span>
  </div>

  <div class="container">
    <h1 class="page-title">Ingresar</h1>
    <p class="page-sub">Ingresá con tu email. Si tu cuenta todavía no está verificada, primero verificá el email.</p>

    <div id="alert" class="alert"></div>

    <div class="card">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="juan@email.com" autocomplete="email" inputmode="email" />
      </div>
      <div class="field">
        <label>Clave</label>
        <input type="password" id="password" placeholder="Tu clave" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-primary" id="btn" onclick="login()">Ingresar</button>

    <div class="link-stack">
      <span><a href="/src/pages/recuperar-clave.html">Olvidé mi contraseña</a></span>
      <span class="link" style="margin-top:0">No tenés cuenta? <a href="/src/pages/registro.html">Crear cuenta</a></span>
    </div>
  </div>

  <script type="module">
    import { obtenerCamioneroPorEmail } from '../lib/supabase.js'

    window.login = async function() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const alertEl = document.getElementById('alert')
      alertEl.className = 'alert'
      alertEl.textContent = ''

      const ADMIN_USER = import.meta.env.VITE_ADMIN_USER || 'admin'
      const ADMIN_PASS = import.meta.env.VITE_ADMIN_PASS || '123456'

      if (!email || !password) {
        alertEl.className = 'alert error'
        alertEl.textContent = 'Ingresá tu email y tu clave.'
        return
      }

      const btn = document.getElementById('btn')
      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Ingresando...'

      try {
        // Admin: entra por este mismo login (usuario/clave admin)
        if (email === ADMIN_USER && password === ADMIN_PASS) {
          sessionStorage.setItem('admin_auth', '1')
          sessionStorage.removeItem('camionero_id')
          sessionStorage.removeItem('camionero_email')
          sessionStorage.removeItem('camionero_nombre')
          window.location.href = '/src/pages/admin.html'
          return
        }

        const c = await obtenerCamioneroPorEmail(email)

        if (c.password != null && String(c.password) !== '' && String(c.password) !== String(password)) {
          alertEl.className = 'alert error'
          alertEl.textContent = 'Clave incorrecta.'
          btn.disabled = false
          btn.textContent = 'Ingresar'
          return
        }

        if (!c.email_verificado) {
          alertEl.className = 'alert error'
          alertEl.textContent = 'Tu email todavía no está verificado. Revisá tu casilla y verificá tu cuenta.'
          btn.disabled = false
          btn.textContent = 'Ingresar'
          return
        }

        sessionStorage.setItem('camionero_id', c.id)
        sessionStorage.setItem('camionero_email', c.email)
        sessionStorage.setItem('camionero_nombre', c.nombre || '')
        sessionStorage.removeItem('admin_auth')

        window.location.href = '/src/pages/home.html'
      } catch (e) {
        console.error(e)
        alertEl.className = 'alert error'
        alertEl.textContent = e?.message || 'No se pudo ingresar. Intentá de nuevo.'
        btn.disabled = false
        btn.textContent = 'Ingresar'
      }
    }
  </script>
</body>
</html>
